<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fathom — Investigation Graph viewer</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --ink:#e6e9ef; --muted:#8b93a3; --line:#2a2f3a; }
  body { margin:0; font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); }
  header h1 { margin:0 0 4px; font-size:16px; }
  #symptom { color:var(--muted); max-width:80ch; }
  #controls { display:flex; align-items:center; gap:14px; padding:12px 20px; border-bottom:1px solid var(--line); }
  #controls input[type=range] { flex:1; }
  .pill { padding:2px 8px; border-radius:10px; background:var(--panel); border:1px solid var(--line); color:var(--muted); }
  #wrap { display:flex; gap:18px; padding:18px 20px; }
  svg { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
  .col-label { fill:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
  .node text { fill:var(--ink); font-size:12px; }
  .sub { fill:var(--muted); font-size:11px; }
  #side { width:330px; }
  #side h3 { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:14px 0 6px; }
  .conf-bar { height:6px; border-radius:3px; background:#222733; margin-top:4px; overflow:hidden; }
  .conf-bar > i { display:block; height:100%; }
  .ev { padding:6px 8px; border:1px solid var(--line); border-radius:6px; margin:4px 0; background:#12151b; }
  .ev .src { color:var(--muted); font-size:11px; }
  .conflict { color:#f1b84b; }
  .trigger { color:#ff7a7a; font-weight:600; }
  .rec { color:#7fd1a8; }
  .legend { color:var(--muted); font-size:12px; padding:0 20px 18px; }
</style>
</head>
<body>
<header>
  <h1>Fathom — Investigation Graph <span id="status" class="pill"></span></h1>
  <div id="symptom"></div>
</header>
<div id="controls">
  <button id="prev">◀</button>
  <input id="slider" type="range" min="0" value="0" />
  <button id="next">▶</button>
  <span id="stepnum" class="pill"></span>
</div>
<div id="wrap">
  <svg id="canvas" width="760" height="520"></svg>
  <div id="side">
    <h3>Leading differential</h3><div id="hyps"></div>
    <h3>Conflicts</h3><div id="conflicts"></div>
    <h3>Recommended next action</h3><div id="rec" class="rec"></div>
  </div>
</div>
<div class="legend">
  Hypothesis fill = confidence (red→green). Bold ring = leading. Edges: green = supporting (+),
  red = contradicting (−), thickness ∝ weight. <span class="conflict">⚑ conflict</span>,
  <span class="trigger">⚠ demoted trigger</span>.
</div>
<script src="ig_data.js"></script>
<script>
const D = window.IG_DATA || {steps:[]};
const SVG = "http://www.w3.org/2000/svg";
const canvas = document.getElementById("canvas");
const slider = document.getElementById("slider");
slider.max = Math.max(0, D.steps.length - 1);

function confColor(c){ // 0=red .5=amber 1=green
  const r = Math.round(255*(1-Math.max(0,(c-0.5)*2)));
  const g = Math.round(255*Math.min(1,c*2));
  return `rgb(${Math.min(255,r+40)},${Math.min(255,g)},90)`;
}
function el(tag, attrs){ const e=document.createElementNS(SVG,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

function isTrigger(id){ return D.trigger && id === D.trigger; }

function render(i){
  const step = D.steps[i]; if(!step) return;
  document.getElementById("stepnum").textContent = `step ${i} / ${D.steps.length-1}`;
  document.getElementById("status").textContent = step.status || "";
  document.getElementById("symptom").textContent = D.symptom || "";
  while(canvas.firstChild) canvas.removeChild(canvas.firstChild);

  const H = step.hypotheses, E = step.evidence;
  const hx = 170, ex = 600, top = 60, gapH = H.length? Math.min(80,(440)/Math.max(1,H.length)) : 0;
  const gapE = E.length? Math.min(60,(440)/Math.max(1,E.length)) : 0;
  const hpos = {}, epos = {};
  H.forEach((h,k)=> hpos[h.id] = top + k*gapH);
  E.forEach((e,k)=> epos[e.id] = top + k*gapE);

  canvas.appendChild(Object.assign(el("text",{x:hx-60,y:34,class:"col-label"}),{textContent:"hypotheses"}));
  canvas.appendChild(Object.assign(el("text",{x:ex-30,y:34,class:"col-label"}),{textContent:"evidence"}));

  // links first (under nodes)
  step.links.forEach(l=>{
    if(hpos[l.hypothesis_id]===undefined || epos[l.evidence_id]===undefined) return;
    const ln = el("line",{x1:ex-8,y1:epos[l.evidence_id],x2:hx+90,y2:hpos[l.hypothesis_id],
      stroke: l.polarity==="+"?"#4fae7e":"#d9534f", "stroke-width": 1+Math.min(4,l.weight*2), "stroke-opacity":0.7});
    canvas.appendChild(ln);
  });

  // hypothesis nodes
  H.forEach(h=>{
    const y = hpos[h.id];
    const g = el("g",{class:"node"});
    const leading = h.status==="leading";
    g.appendChild(el("circle",{cx:hx,cy:y,r:14,fill:confColor(h.confidence),
      stroke: leading?"#ffffff":"#3a4150","stroke-width":leading?3:1}));
    g.appendChild(Object.assign(el("text",{x:hx+24,y:y-2}),{textContent:(h.label||h.id).slice(0,30)}));
    g.appendChild(Object.assign(el("text",{x:hx+24,y:y+13,class:"sub"}),
      {textContent:`${h.node_ref||""}  conf ${h.confidence.toFixed(2)}  ${h.status}`}));
    canvas.appendChild(g);
  });

  // evidence nodes
  E.forEach(e=>{
    const y = epos[e.id];
    const g = el("g",{class:"node"});
    g.appendChild(el("rect",{x:ex-8,y:y-8,width:16,height:16,rx:3,fill:"#3a4150",stroke:"#555c6b"}));
    g.appendChild(Object.assign(el("text",{x:ex+16,y:y+4,class:"sub"}),{textContent:(e.source||e.id).slice(0,22)}));
    canvas.appendChild(g);
  });

  // side panels
  const hyps = document.getElementById("hyps"); hyps.innerHTML="";
  [...H].sort((a,b)=>b.confidence-a.confidence).forEach(h=>{
    const d=document.createElement("div"); d.className="ev";
    d.innerHTML=`<b>${(h.label||h.id)}</b> <span class="src">${h.node_ref||""} · ${h.status}</span>
      <div class="conf-bar"><i style="width:${Math.round(h.confidence*100)}%;background:${confColor(h.confidence)}"></i></div>`;
    hyps.appendChild(d);
  });
  const conf = document.getElementById("conflicts"); conf.innerHTML="";
  if(!step.conflicts.length) conf.innerHTML='<span class="src">none yet</span>';
  step.conflicts.forEach(c=>{
    const d=document.createElement("div");
    d.className = isTrigger(c)?"trigger":"conflict";
    d.textContent = (isTrigger(c)?"⚠ ":"⚑ ") + c + (isTrigger(c)?"  (demoted trigger — coincident, not causal)":"");
    conf.appendChild(d);
  });
  document.getElementById("rec").textContent = step.recommended_action || "—";
}

slider.addEventListener("input", e=> render(+e.target.value));
document.getElementById("prev").onclick = ()=>{ slider.value=Math.max(0,+slider.value-1); render(+slider.value); };
document.getElementById("next").onclick = ()=>{ slider.value=Math.min(+slider.max,+slider.value+1); render(+slider.value); };
render(0);
</script>
</body>
</html>
